apiVersion: v1
kind: Secret
metadata:
  name: pelagodb-secrets
type: Opaque
stringData:
  # Replace with your foundationdb cluster contents.
  fdb.cluster: "docker:docker@127.0.0.1:4500"

  # Replicator auth key used when pulling from peers.
  replication-api-key: "replace-me"

  # Optional API keys map consumed by PELAGO_API_KEYS.
  # Format: key[:principal],key[:principal]
  api-keys: "demo-key:demo,ops-key:ops"
