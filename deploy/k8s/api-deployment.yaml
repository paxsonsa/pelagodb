apiVersion: apps/v1
kind: Deployment
metadata:
  name: pelagodb-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pelagodb
      role: api
  template:
    metadata:
      labels:
        app: pelagodb
        role: api
    spec:
      containers:
        - name: pelagodb-api
          image: ghcr.io/pelagodb/pelago-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27615
              name: grpc
          envFrom:
            - configMapRef:
                name: pelagodb-config
          env:
            - name: PELAGO_REPLICATION_ENABLED
              value: "false"
            - name: PELAGO_CACHE_PATH
              value: /var/lib/pelago/cache
            - name: PELAGO_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: pelagodb-secrets
                  key: api-keys
          volumeMounts:
            - name: cache
              mountPath: /var/lib/pelago/cache
            - name: fdb-cluster
              mountPath: /etc/pelago
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: cache
          emptyDir: {}
        - name: fdb-cluster
          secret:
            secretName: pelagodb-secrets
            items:
              - key: fdb.cluster
                path: fdb.cluster
