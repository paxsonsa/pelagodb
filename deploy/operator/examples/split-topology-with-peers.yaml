apiVersion: pelago.pelagodb.io/v1alpha1
kind: PelagoSite
metadata:
  name: pelago-site2
spec:
  image:
    repository: ghcr.io/pelagodb/pelago-server
    tag: latest
    pullPolicy: IfNotPresent
  site:
    id: 2
    name: us-west-2
  fdb:
    clusterFileSecretRef:
      name: pelagodb-secrets
      key: fdb.cluster
  defaults:
    database: default
    namespace: default
  auth:
    required: true
    apiKeysSecretRef:
      name: pelagodb-secrets
      key: api-keys
  api:
    replicas: 4
    service:
      serviceType: LoadBalancer
      port: 27615
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
    cache:
      enabled: true
      path: /var/lib/pelago/cache
      projectorBatchSize: 1000
    hpa:
      enabled: true
      minReplicas: 4
      maxReplicas: 20
      targetCpuUtilizationPercentage: 65
    pdb:
      enabled: true
      minAvailable: 3
  replicator:
    enabled: true
    replicas: 2
    batchSize: 512
    pollMs: 300
    lease:
      enabled: true
      ttlMs: 10000
      heartbeatMs: 2000
    scopes:
      - database: default
        namespace: default
      - database: analytics
        namespace: live
    peers:
      - siteId: "1"
        endpoint: site1-api.internal.example.com:27615
        apiKeySecretRef:
          name: pelagodb-secrets
          key: replication-api-key
    tls:
      mode: MutualTLS
      serverName: site1-api.internal.example.com
      caBundleSecretRef:
        name: pelagodb-secrets
        key: replication-ca
      clientCertSecretRef:
        name: pelagodb-secrets
        key: replication-client-cert
      clientKeySecretRef:
        name: pelagodb-secrets
        key: replication-client-key
