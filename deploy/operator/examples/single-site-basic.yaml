apiVersion: pelago.pelagodb.io/v1alpha1
kind: PelagoSite
metadata:
  name: pelago-site1
spec:
  image:
    repository: ghcr.io/pelagodb/pelago-server
    tag: latest
    pullPolicy: IfNotPresent
  site:
    id: 1
    name: us-east-1
  fdb:
    clusterFileSecretRef:
      name: pelagodb-secrets
      key: fdb.cluster
  defaults:
    database: default
    namespace: default
  auth:
    required: true
    apiKeysSecretRef:
      name: pelagodb-secrets
      key: api-keys
  api:
    replicas: 3
    service:
      serviceType: ClusterIP
      port: 27615
    cache:
      enabled: true
      path: /var/lib/pelago/cache
      projectorBatchSize: 1000
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCpuUtilizationPercentage: 65
    pdb:
      enabled: true
      minAvailable: 2
  replicator:
    enabled: false
    replicas: 2
    batchSize: 512
    pollMs: 300
    lease:
      enabled: true
      ttlMs: 10000
      heartbeatMs: 2000
    scopes:
      - database: default
        namespace: default
