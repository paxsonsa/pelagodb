{{- if .Values.operator.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pelago-operator.fullname" . }}-webhook
  labels:
    app.kubernetes.io/name: {{ include "pelago-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "pelago-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: https
      port: {{ .Values.webhook.service.port }}
      targetPort: {{ .Values.webhook.service.targetPort }}
{{- end }}
