{{- if and .Values.operator.webhook.enabled .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.certManager.issuerName }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "pelago-operator.fullname" . }}-webhook-cert
spec:
  secretName: {{ include "pelago-operator.fullname" . }}-webhook-cert
  dnsNames:
    - {{ include "pelago-operator.fullname" . }}-webhook
    - {{ include "pelago-operator.fullname" . }}-webhook.{{ .Release.Namespace }}
    - {{ include "pelago-operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
  issuerRef:
    name: {{ .Values.certManager.issuerName }}
    kind: {{ .Values.certManager.issuerKind }}
    group: {{ .Values.certManager.issuerGroup }}
{{- end }}
