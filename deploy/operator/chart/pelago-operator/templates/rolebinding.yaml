{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pelago-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pelago-operator.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pelago-operator.fullname" . }}
{{- end }}
