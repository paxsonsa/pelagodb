name: Operator Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - crates/pelago-operator/**
      - Cargo.toml
      - Cargo.lock

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push operator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/pelago-operator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pelago-operator:latest
            ghcr.io/${{ github.repository_owner }}/pelago-operator:${{ github.sha }}
